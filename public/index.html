<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GCB Bank Loan Calculator</title>

    <!-- ✅ Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-header {
            width: 100%;
            background: linear-gradient(135deg, #003399, #002266);
            padding: 25px 20px 45px;
            color: white;
            font-size: 22px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
            border-bottom: 4px solid #FFCC00;
        }

        .card {
            background: white;
            width: 92%;
            max-width: 450px;
            margin-top: -30px;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        h2 {
            font-size: 24px;
            color: #003399;
            margin: 0 0 5px;
            text-align: center;
            font-weight: 700;
        }

        .subtext {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-bottom: 30px;
        }

        .slider-section { margin-bottom: 25px; }

        .slider-header {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        .brand-text { color: #003399; font-weight: bold; }

        input[type=range] {
            width: 100%;
            accent-color: #003399;
            margin: 15px 0;
            height: 6px;
        }

        .slider-footer {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #999;
        }

        .result-container {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 18px;
            text-align: center;
            margin: 25px 0;
        }

        .result-value {
            color: #003399;
            font-size: 32px;
            font-weight: 800;
            margin: 5px 0 0;
        }

        .btn-apply {
            background: linear-gradient(to right, #FFCC00, #ffa600);
            color: #003399;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-apply:active {
            background: #e6b800;
        }

        .footer {
            text-align: center;
            font-size: 11px;
            color: #888;
            margin: 30px 0;
        }
    </style>
</head>

<body>

<div class="app-header">
    <span>GCB Bank</span>
    <span>☰</span>
</div>

<div class="card">
    <h2>Personal Loan Calculator</h2>
    <div class="subtext">Fast Approvals • Competitive Rates • Flexible Repayments</div>

    <div class="slider-section">
        <div class="slider-header">
            <span>Loan Amount</span>
            <span id="valAmt" class="brand-text">GH₵ 10,000</span>
        </div>
        <input type="range" id="amt" min="1000" max="150000" step="1000" value="10000">
        <div class="slider-footer"><span>GH₵ 1,000</span><span>GH₵ 150,000</span></div>
    </div>

    <div class="slider-section">
        <div class="slider-header">
            <span>Repayment Period</span>
            <span id="valDur" class="brand-text">12 Months</span>
        </div>
        <input type="range" id="dur" min="6" max="60" step="6" value="12">
        <div class="slider-footer"><span>6 Months</span><span>60 Months</span></div>
    </div>

    <div class="result-container">
        <p style="margin:0; font-size:14px; color:#666; font-weight: 500;">Estimated Monthly Installment</p>
        <p id="monthly" class="result-value">GH₵ 1,050.00</p>
    </div>

    <button class="btn-apply" onclick="goToPage2()">APPLY NOW</button>
</div>

<div class="footer">© 2026 GCB Bank PLC. All rights reserved.</div>

<script>
    function update() {
        const amtEl = document.getElementById('amt');
        const durEl = document.getElementById('dur');

        if (!amtEl || !durEl) return;

        const amount = Number(amtEl.value) || 0;
        const duration = Number(durEl.value) || 1;

        document.getElementById('valAmt').innerText = `GH₵ ${amount.toLocaleString()}`;
        document.getElementById('valDur').innerText = `${duration} Months`;

        // Simplified placeholder logic (adjust 1.26 multiplier to align with GCB's actual interest rates)
        const monthly = (amount * 1.26) / duration;
        document.getElementById('monthly').innerText = `GH₵ ${monthly.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
    }

    function goToPage2() {
        const amtEl = document.getElementById('amt');
        const durEl = document.getElementById('dur');

        if (!amtEl || !durEl) return;

        localStorage.setItem('amount', amtEl.value);
        localStorage.setItem('loanDuration', durEl.value + " Months");

        window.location.href = "/page2";
    }

    window.onload = () => {
        const tg = window.Telegram?.WebApp;

        if (tg) {
            tg.ready();
            tg.expand();
        }

        const amtEl = document.getElementById('amt');
        const durEl = document.getElementById('dur');

        if (amtEl) amtEl.addEventListener('input', update);
        if (durEl) durEl.addEventListener('input', update);

        update();
    };
</script>

</body>
</html>
